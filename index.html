<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>도매회원 전용</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap');

body{
font-family:'Noto Sans KR', sans-serif;
background:#ffffff;
margin:0;
padding:30px 20px;
text-align:center;
color:#222;
}

.hidden{
display:none;
}

/* 내가 추가했다 */

h3 {
  font-size: 15px;
}

/* 공통 버튼 스타일 */

button{
padding:12px 22px;
margin:8px;
font-size:15px;
font-weight:500;
border-radius:8px;
border:1px solid #d0d7de;
background:#ffffff;
cursor:pointer;
transition:all 0.2s ease;
}

button:hover{
background:#f3f6fa;
border-color:#b8c2cc;
}

/* 메인 메뉴 버튼 */

.menu button{
min-width:180px;
font-size:16px;
}

/* 상품 버튼 */

.product-list button{
display:block;
margin:10px auto;
width:220px;
}

/* 표 */

table{
border-collapse:collapse;
margin:25px auto;
width:90%;
max-width:650px;
}

th,td{
border:1px solid #e2e6ea;
padding:10px;
font-size:14px;
}

th{
background:#f7f8fa;
font-weight:600;
}

/* 돌아가기 버튼 */

.back{
display:inline-block;
margin-top:25px;
padding:10px 20px;
border-radius:8px;
background:#2f6fed;
color:#ffffff;
font-size:14px;
font-weight:500;
cursor:pointer;
transition:background 0.2s ease;
}

.back:hover{
background:#1f57c9;
}

</style>
</head>

<body>

<!-- 비밀번호 화면 -->

<div id="login">

<h2>도매회원 전용 페이지</h2>

<input type="password" id="pw" inputmode="numeric" placeholder="비밀번호 입력">
<button onclick="checkPW()">접속</button>

</div>


<!-- 1차 메뉴 -->

<div id="mainMenu" class="hidden">

<h2>메뉴</h2>

<div class="menu">

<button onclick="stockNotice()">재고확인</button>

<button onclick="showPage('wholesaleInfo')">도매회원 안내</button>

</div>

</div>


<!-- 도매회원 안내 -->

<div id="wholesaleInfo" class="hidden">

<h2>도매회원 안내</h2>

<p>추후 내용 추가 예정</p>

<div class="back" onclick="goMain()">← 메뉴로 돌아가기</div>

</div>


<!-- 상품 목록 -->

<div id="stockMenu" class="hidden">

<h2>상품 선택</h2>
<h3>❌ 품절  🔴 낱볼 재고
🟢 1팩 이상  🔵 여유</h3>

<div id="productList"></div>

<div id="stockPage" class="hidden">

<h2 id="productTitle"></h2>
<p id="updateDate" style="font-size:13px;color:#666;margin-top:-10px;"></p>

<table id="stockTable">

<tr>
<th>품명</th>
<th>색상번호</th>
<th>색상명</th>
<th>재고상태</th>
</tr>

</table>

<div class="back" onclick="goBack()">← 상품목록</div>

</div>

<div class="back" onclick="goMain()">← 메뉴로 돌아가기</div>

</div>





<script>

const PASSWORD="1234";

function checkPW(){

const input=document.getElementById("pw").value;

if(input===PASSWORD){

document.getElementById("login").style.display="none";
document.getElementById("mainMenu").style.display="block";

}else{

alert("비밀번호가 틀렸습니다.");

}

}


function showPage(id){

hideAll();

document.getElementById(id).style.display="block";

}


function showProduct(id){

hideAll();

document.getElementById(id).style.display="block";

}


function goMain(){

hideAll();

document.getElementById("mainMenu").style.display="block";

}


function hideAll(){

const pages=[
"mainMenu",
"stockMenu",
"wholesaleInfo"
];

pages.forEach(p=>{
document.getElementById(p).style.display="none";
});

}

function stockNotice(){

alert("현재 제공되는 재고 정보는 시범 운영 중인 참고용 자료입니다.\n실시간 반영 정보가 아니며 실제 재고와 차이가 있을 수 있으니 주문 전 반드시 확인해 주세요.");

showPage('stockMenu');

}

let stockData=[];

fetch('stock.csv')
.then(res=>res.text())
.then(text=>{

const rows=text.trim().split('\n').slice(1);

rows.forEach(r=>{

const cols=r.split(',').map(c=>c.trim());

sstockData.push({
product:cols[0],
colorNo:cols[1],
colorName:cols[2],
stock:cols[3],
update:cols[4]
});

});

createProductList();

});

function createProductList(){

const products=[...new Set(stockData.map(d=>d.product))];

const list=document.getElementById("productList");

products.forEach(p=>{

const btn=document.createElement("button");

btn.innerText=p;

btn.onclick=()=>showProduct(p);

list.appendChild(btn);

});

}

function showProduct(name){

document.getElementById("productList").style.display="none";
document.getElementById("stockPage").style.display="block";

document.getElementById("productTitle").innerText=name;
  const update=stockData.find(d=>d.product===name)?.update || "";
document.getElementById("updateDate").innerText="업데이트: "+update;

const table=document.getElementById("stockTable");

table.innerHTML=`
<tr>
<th>품명</th>
<th>색상번호</th>
<th>색상명</th>
<th>재고상태</th>
</tr>
`;

stockData
.filter(d=>d.product===name)
.forEach(d=>{

table.innerHTML+=`
<tr>
<td>${d.product}</td>
<td>${d.colorNo}</td>
<td>${d.colorName}</td>
<td>${d.stock}</td>
</tr>
`;

});

}

function goBack(){

document.getElementById("stockPage").style.display="none";
document.getElementById("productList").style.display="block";

}

</script>

</body>
</html>
